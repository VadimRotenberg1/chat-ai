<section class="login-page">
    <form class="login-card" (submit)="onSubmit($event)" autocomplete="off">
        <h1 class="login-title">Sign in</h1>
        <p class="login-subtitle">Enter your credentials to access AI Chat.</p>

        <label class="form-field">
            <span class="form-label">Username</span>
            <input
                type="text"
                name="username"
                autocomplete="username"
                [ngModel]="username()"
                (ngModelChange)="username.set($event)"
                [disabled]="submitting()"
                required
                autofocus />
        </label>

        <label class="form-field">
            <span class="form-label">Password</span>
            <input
                type="password"
                name="password"
                autocomplete="current-password"
                [ngModel]="password()"
                (ngModelChange)="password.set($event)"
                [disabled]="submitting()"
                required />
        </label>

        <p class="form-error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

        <button type="submit" class="login-button" [disabled]="submitting()">
            {{ submitting() ? 'Signing in...' : 'Sign in' }}
        </button>

        <p class="login-hint">Try <code>alice</code> / <code>password123</code> or <code>admin</code> / <code>admin123</code>.</p>
    </form>
</section>

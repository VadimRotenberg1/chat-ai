<app-header></app-header>

<main class="app-shell">
    <section class="chat-panel" aria-label="AI chat">
        <header class="chat-header">
            <div>
                <h1>AI Chat</h1>
                <p>{{ chat.connectionStatus() }}</p>
            </div>
            <button (click)="chat.clearMessages()" class="ghost-button" type="button">Clear</button>
        </header>

        <div #messagesContainer class="messages" aria-live="polite">
            <article *ngFor="let msg of chat.messages()" [class]="'message ' + msg.kind">
                <div class="avatar">{{ msg.kind.startsWith('user') ? 'YOU' : 'AI' }}</div>
                <div class="bubble" *ngIf="msg.isHtml" [innerHTML]="msg.content"></div>
                <div class="bubble" *ngIf="!msg.isHtml">{{ msg.content }}</div>
            </article>
        </div>

        <form (submit)="onSubmit($event)" class="composer-container">
            <div class="toolbar">
                <button type="button" (click)="execCommand('bold')" title="Bold"><b>B</b></button>
                <button type="button" (click)="execCommand('italic')" title="Italic"><i>I</i></button>
                <button type="button" (click)="execCommand('underline')" title="Underline"><u>U</u></button>
            </div>
            <div class="composer">
                <div
                    #editor
                    class="editor"
                    contenteditable="true"
                    role="textbox"
                    aria-label="Message"
                    aria-multiline="true"
                    data-placeholder="Ask a question"
                    (keydown)="onKeyDown($event)"
                    (paste)="onPaste($event)"></div>
                <button [disabled]="chat.isSending() || chat.connectionStatus() !== 'Connected'" class="send-button" type="submit">Send</button>
            </div>
        </form>
    </section>
</main>
